name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
  SUPABASE_URL: http://localhost:54321
  SUPABASE_ANON_KEY: test-anon-key
  SUPABASE_JWT_SECRET: test-jwt-secret-for-ci-pipeline-tests-only!!
  SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
  FIELD_ENCRYPTION_KEY: test-field-encryption-key-32chars!!
  NODE_ENV: test

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run test:security
      - run: npm run test:search
      - run: npm run test:audit
      - run: npm run security:owasp

  flutter:
    name: Flutter — analyze & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  admin:
    name: Admin — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_BASE: /v1

  facility-portal:
    name: Facility Portal — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: facility-portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          API_URL: http://localhost:3000

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend, admin, facility-portal, flutter]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: smarthealth-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          push: false
          tags: smarthealth-admin:ci
          build-args: VITE_API_BASE=/v1

      - name: Build Facility Portal image
        uses: docker/build-push-action@v6
        with:
          context: ./facility-portal
          push: false
          tags: smarthealth-facility-portal:ci
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=http://localhost:8000
            NEXT_PUBLIC_SUPABASE_ANON_KEY=test-anon-key

  compose-smoke:
    name: Docker Compose — smoke test
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: cp docker/.env.example .env

      - name: Generate SSL certs
        run: sh docker/scripts/generate-ssl.sh

      - name: Start database, migrate, and API
        run: |
          docker compose up -d db redis
          timeout 90 sh -c 'until docker compose exec -T db pg_isready -U postgres; do sleep 3; done'
          docker compose run --rm smarthealth-migrate
          docker compose build smarthealth-api
          docker compose up -d --no-deps smarthealth-api

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health; then exit 0; fi
            sleep 5
          done
          docker compose logs smarthealth-api
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
