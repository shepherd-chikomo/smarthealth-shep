name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - production
      target:
        description: Cloud provider
        required: true
        type: choice
        options:
          - hetzner
          - digitalocean
          - aws
          - azure
          - ubuntu-vps

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/smarthealth

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, admin, facility-portal]
        include:
          - service: api
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: admin
            context: ./admin
            dockerfile: ./admin/Dockerfile
            build_args: VITE_API_BASE=/v1
          - service: facility-portal
            context: ./facility-portal
            dockerfile: ./facility-portal/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/smarthealth-${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ inputs.target || 'production' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (Ubuntu VPS / Hetzner / DigitalOcean)
        if: contains(fromJSON('["hetzner","digitalocean","ubuntu-vps"]'), inputs.target || 'ubuntu-vps')
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/smarthealth
            git pull origin main
            if [ ! -f .env ]; then
              cp docker/.env.example .env
              echo "WARNING: Created .env from example — configure production secrets before go-live"
            fi
            docker compose pull
            docker compose --profile migrate run --rm smarthealth-migrate
            docker compose up -d --remove-orphans
            docker compose --profile monitoring up -d
            sh docker/scripts/healthcheck.sh

      - name: Deploy to AWS (ECS placeholder)
        if: inputs.target == 'aws'
        run: |
          echo "Push images to ECR and update ECS service — configure AWS_DEPLOY_ROLE in secrets"
          echo "See docs/deployment/AWS.md"

      - name: Deploy to Azure (Container Apps placeholder)
        if: inputs.target == 'azure'
        run: |
          echo "Update Azure Container Apps — configure AZURE_CREDENTIALS in secrets"
          echo "See docs/deployment/AZURE.md"

      - name: Notify Sentry release
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            curl -sf -X POST "https://sentry.io/api/0/organizations/${SENTRY_ORG}/releases/" \
              -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"version\":\"${{ github.ref_name }}\",\"projects\":[\"${SENTRY_PROJECT}\"]}"
          fi
