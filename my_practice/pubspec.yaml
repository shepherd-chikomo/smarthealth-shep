name: my_practice
description: MyPractice — practitioner clinical workstation powered by SmartHealth.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  smarthealth_core:
    path: ../packages/smarthealth_core

  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.34
  equatable: ^2.0.8
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^9.2.4
  go_router: ^17.2.3
  intl: ^0.20.2
  json_annotation: ^4.12.0
  local_auth: ^2.3.0
  material_symbols_icons: ^4.2928.1
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  speech_to_text: ^7.0.0
  table_calendar: ^3.2.0
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.28.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0
  mockito: ^5.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/seed/
