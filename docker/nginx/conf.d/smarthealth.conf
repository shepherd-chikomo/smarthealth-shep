upstream smarthealth_api {
  server smarthealth-api:3000;
  keepalive 32;
}

upstream smarthealth_admin {
  server smarthealth-admin:80;
  keepalive 8;
}

upstream smarthealth_portal {
  server smarthealth-facility-portal:3001;
  keepalive 16;
}

upstream smarthealth_mypractice_web {
  server smarthealth-mypractice-web:3003;
  keepalive 8;
}

upstream smarthealth_myhealth_web {
  server smarthealth-myhealth-web:3004;
  keepalive 8;
}

upstream supabase_kong {
  server kong:8000;
  keepalive 16;
}

# Variable proxy targets re-resolve via Docker DNS (see nginx.conf resolver).
map $host $smarthealth_api_upstream {
  default smarthealth-api:3000;
}

map $host $smarthealth_admin_upstream {
  default smarthealth-admin:80;
}

map $host $smarthealth_portal_upstream {
  default smarthealth-facility-portal:3001;
}

# Marketing site on mypractice.* — facility portal stays on dev.* and other hosts
map $host $smarthealth_root_upstream {
  mypractice.smarthealth.co.zw smarthealth-mypractice-web:3003;
  myhealth.smarthealth.co.zw smarthealth-myhealth-web:3004;
  default smarthealth-facility-portal:3001;
}

map $host $supabase_kong_upstream {
  default kong:8000;
}

# HTTP — health + ACME renewals; everything else redirects to HTTPS
server {
  listen 80;
  server_name _;

  location = /health {
    access_log off;
    proxy_pass http://$smarthealth_api_upstream/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    allow all;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# TLS termination (production — mount certs to /etc/nginx/ssl/)
server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;

  location = /health {
    proxy_pass http://$smarthealth_api_upstream/health;
  }

  # Large register uploads (HPA ~5k+ rows) can exceed the default 60s proxy timeout.
  location ~ ^/v1/admin/import/(practitioners|facilities)$ {
    proxy_pass http://$smarthealth_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    client_max_body_size 50m;
  }

  location /v1/ {
    proxy_pass http://$smarthealth_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /docs {
    proxy_pass http://$smarthealth_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /auth/v1/ {
    proxy_pass http://$supabase_kong_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /rest/v1/ {
    proxy_pass http://$supabase_kong_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /storage/v1/ {
    proxy_pass http://$supabase_kong_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    client_max_body_size 50m;
  }

  location /admin/ {
    # Use the upstream block (not $variable/) so /admin/assets/* reaches the admin container
    # with the /admin prefix intact. Variable proxy_pass + trailing slash breaks asset paths.
    proxy_pass http://smarthealth_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /admin {
    return 301 /admin/;
  }

  location / {
    proxy_pass http://$smarthealth_root_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
