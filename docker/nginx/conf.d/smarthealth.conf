upstream smarthealth_api {
  server smarthealth-api:3000;
  keepalive 32;
}

upstream smarthealth_admin {
  server smarthealth-admin:80;
  keepalive 8;
}

upstream smarthealth_portal {
  server smarthealth-facility-portal:3001;
  keepalive 16;
}

upstream supabase_kong {
  server kong:8000;
  keepalive 16;
}

# Health check endpoint for Docker / load balancers
server {
  listen 80;
  server_name _;

  location = /health {
    access_log off;
    proxy_pass http://smarthealth_api/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # ── API ──────────────────────────────────────────────────────────────────
  location /v1/ {
    proxy_pass http://smarthealth_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }

  location /docs {
    proxy_pass http://smarthealth_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # ── Supabase API (auth, rest, storage) ───────────────────────────────────
  location /auth/v1/ {
    proxy_pass http://supabase_kong;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /rest/v1/ {
    proxy_pass http://supabase_kong;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /storage/v1/ {
    proxy_pass http://supabase_kong;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    client_max_body_size 50m;
  }

  # ── Admin dashboard ───────────────────────────────────────────────────────
  location /admin/ {
    proxy_pass http://smarthealth_admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location = /admin {
    return 301 /admin/;
  }

  # ── Facility portal (default) ─────────────────────────────────────────────
  location / {
    proxy_pass http://smarthealth_portal;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

# TLS termination (production — mount certs to /etc/nginx/ssl/)
server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;

  location = /health {
    proxy_pass http://smarthealth_api/health;
  }

  location /v1/ {
    proxy_pass http://smarthealth_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs {
    proxy_pass http://smarthealth_api;
  }

  location /auth/v1/ {
    proxy_pass http://supabase_kong;
    proxy_set_header Host $host;
  }

  location /rest/v1/ {
    proxy_pass http://supabase_kong;
  }

  location /storage/v1/ {
    proxy_pass http://supabase_kong;
    client_max_body_size 50m;
  }

  location /admin/ {
    proxy_pass http://smarthealth_admin/;
  }

  location = /admin {
    return 301 /admin/;
  }

  location / {
    proxy_pass http://smarthealth_portal;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
