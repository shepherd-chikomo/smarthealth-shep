server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html/admin;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json;

  location /admin/ {
    alias /usr/share/nginx/html/admin/;
    try_files $uri $uri/ /admin/index.html;
  }

  location = /admin {
    return 301 /admin/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
