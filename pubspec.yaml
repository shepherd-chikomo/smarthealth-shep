name: smarthealth_shep
description: SmartHealth Patient App — healthcare directory and emergency hub for Africa.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  smarthealth_core:
    path: packages/smarthealth_core
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  dio_cache_interceptor: ^3.5.1
  dio_cache_interceptor_hive_store: ^4.0.0
  equatable: ^2.0.8
  flutter_map: ^8.3.0
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  latlong2: ^0.9.1
  material_symbols_icons: ^4.2928.1
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  table_calendar: ^3.2.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  flutter_bloc: ^9.1.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  workmanager: ^0.9.0+3
  background_fetch: ^1.5.0
  flutter_svg: ^2.2.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  cryptography: ^2.7.0
  file_picker: ^10.1.2
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.6
  flutter_local_notifications: ^19.2.1
  sms_autofill: ^2.5.0
  flutter_contacts: ^2.2.1
  image_picker: ^1.2.2
  google_mlkit_text_recognition: ^0.15.1
  permission_handler: ^12.0.3
  timezone: ^0.10.1
  flutter_timezone: ^4.1.0

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  image: ^4.8.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  mockito: ^5.4.6
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/app_icon_foreground.png

flutter_native_splash:
  color: "#4DBFE8"
  image: assets/splash/myhealth_boot_native.png
  android_gravity: fill
  android_12:
    color: "#4DBFE8"
    image: assets/splash/myhealth_boot_native.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/providers/
    - assets/images/onboarding/
    - assets/images/placeholders/
    - assets/icons/categories/
    - assets/icons/emergency/
    - assets/icons/ui/
    - assets/icon/
    - assets/splash/
